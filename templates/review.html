<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ cfg.study_title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="topbar-left">
      <strong>{{ cfg.study_title }}</strong>
      <button id="help-btn" class="link-btn" title="Show instructions">instructions</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-track"><div id="progress-fill" class="progress-fill"></div></div>
      <span id="progress-text" class="muted">loading…</span>
    </div>
    <div class="topbar-right">
      <span class="muted">{{ rater }}</span>
      <a href="{{ url_for('logout') }}">exit</a>
    </div>
  </header>

  <div id="help-box" class="help-box hidden">{{ cfg.instructions }}</div>

  <main id="stage-area">
    <div class="viewport" id="viewport">
      <div class="stage" id="stage">
        <img id="patch-img" alt="patch" draggable="false">
        <div class="dim dim-top"></div><div class="dim dim-bottom"></div>
        <div class="dim dim-left"></div><div class="dim dim-right"></div>
        <div class="highlight" id="highlight"></div>
      </div>
    </div>
  </main>

  <footer class="controls">
    <div class="control-row">
      <div class="caption" id="caption"></div>
      <div class="view-tools">
        <label class="toggle"><input type="checkbox" id="dim-toggle" checked> spotlight</label>
        <span class="zoom-group">
          <button data-zoom="out" class="zoom-btn">−</button>
          <span id="zoom-label">1.0×</span>
          <button data-zoom="in" class="zoom-btn">+</button>
        </span>
      </div>
    </div>

    <div class="control-row answers" id="answers"><!-- answer buttons --></div>

    <div class="control-row nav">
      <button id="back-btn" class="nav-btn">‹ Back</button>
      <span class="hint">keys: <kbd>Y</kbd> yes · <kbd>N</kbd> no · <kbd>U</kbd> unsure ·
        <kbd>←</kbd>/<kbd>→</kbd> move</span>
      <button id="next-btn" class="nav-btn">Next ›</button>
    </div>
  </footer>

  <div id="done-overlay" class="done-overlay hidden">
    <div class="card">
      <h1>All done — thank you!</h1>
      <p id="done-text" class="muted"></p>
      <button id="review-again" class="btn-secondary">Look back over my answers</button>
    </div>
  </div>

  <script>window.OPTION_META = {
    yes:    {label: "Yes — mitosis",     cls: "ans-yes",    key: "y"},
    no:     {label: "No — not mitosis",  cls: "ans-no",     key: "n"},
    unsure: {label: "Unsure",            cls: "ans-unsure", key: "u"}
  };</script>
  <script src="{{ url_for('static', filename='review.js') }}"></script>
</body>
</html>
